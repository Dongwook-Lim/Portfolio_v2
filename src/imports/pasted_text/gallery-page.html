<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Immersive 3D Gallery</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #0c0c0c;
            --text-color: #f0f0f0;
            --accent-color: #d4af37; /* Gold accent */
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Inter', sans-serif;
            cursor: none; /* Hide default cursor */
            user-select: none;
            -webkit-user-select: none;
        }

        /* Typography */
        h1, h2, .display-font {
            font-family: 'Anton', sans-serif;
            text-transform: uppercase;
        }

        /* Custom Cursor */
        .cursor {
            position: fixed;
            top: 0;
            left: 0;
            width: 12px;
            height: 12px;
            background-color: var(--text-color);
            border-radius: 50%;
            pointer-events: none;
            z-index: 9999;
            transform: translate(-50%, -50%);
            transition: width 0.3s ease, height 0.3s ease, background-color 0.3s ease, mix-blend-mode 0.3s ease;
            mix-blend-mode: difference;
        }
        
        .cursor.hovered {
            width: 60px;
            height: 60px;
            background-color: transparent;
            border: 1px solid var(--text-color);
            mix-blend-mode: normal;
        }

        .cursor.hovered::after {
            content: "VIEW";
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 10px;
            font-weight: 500;
            letter-spacing: 1px;
            color: var(--text-color);
        }

        /* Header Navigation */
        header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            padding: 2rem 3rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
            pointer-events: none; /* Let clicks pass through if not on links */
        }
        header a {
            pointer-events: auto;
            text-decoration: none;
            color: var(--text-color);
            font-size: 0.85rem;
            letter-spacing: 2px;
            font-weight: 500;
            position: relative;
            cursor: none;
        }
        header a::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 0;
            width: 0%;
            height: 1px;
            background-color: var(--text-color);
            transition: width 0.3s ease;
        }
        header a:hover::after { width: 100%; }

        .progress-bar-container {
            width: 150px;
            height: 2px;
            background-color: rgba(255,255,255,0.2);
            position: relative;
            display: flex;
            align-items: center;
        }
        .progress-bar {
            height: 100%;
            background-color: var(--text-color);
            width: 0%;
            transform-origin: left;
            will-change: width;
        }
        .progress-text {
            font-family: 'Anton', sans-serif;
            font-size: 0.85rem;
            letter-spacing: 2px;
            margin: 0 1rem;
            color: rgba(255,255,255,0.5);
        }

        /* 3D Gallery Canvas */
        .gallery-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            perspective: 1200px;
            display: flex;
            align-items: center;
            justify-content: center;
            transform-style: preserve-3d;
        }

        .gallery-track {
            position: relative;
            width: 100%;
            height: 100%;
            transform-style: preserve-3d;
        }

        .gallery-item {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 26vw;
            height: 38vw;
            max-width: 320px;
            max-height: 460px;
            margin-top: calc(-19vw); /* half of height */
            margin-left: calc(-13vw); /* half of width */
            transform-style: preserve-3d;
            will-change: transform;
            cursor: none;
            transition: opacity 0.5s ease;
        }

        @media (min-width: 1200px) {
            .gallery-item {
                margin-top: -230px;
                margin-left: -160px;
            }
        }

        .gallery-item-inner {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.1s ease-out; /* For tilt effect */
        }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: grayscale(20%) contrast(1.1);
            box-shadow: -15px 15px 40px rgba(0,0,0,0.6);
            transition: filter 0.5s ease, box-shadow 0.5s ease;
            pointer-events: none; /* Prevent drag issues */
        }

        .gallery-item:hover img {
            filter: grayscale(0%) contrast(1.2);
            box-shadow: -20px 20px 50px rgba(0,0,0,0.8);
        }

        .item-index {
            position: absolute;
            bottom: -30px;
            left: 0;
            font-size: 0.75rem;
            letter-spacing: 1px;
            opacity: 0.6;
        }

        /* Detail View (Overlay) */
        .detail-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-color);
            z-index: 50;
            opacity: 0;
            pointer-events: none;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.8s cubic-bezier(0.77, 0, 0.175, 1);
            overflow: hidden;
        }

        .detail-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .detail-bg-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.9);
            font-size: 18vw;
            white-space: nowrap;
            color: #1a1a1a;
            z-index: 1;
            opacity: 0;
            transition: all 1s cubic-bezier(0.19, 1, 0.22, 1) 0.2s;
            mix-blend-mode: normal; /* In video it's large behind the image */
            pointer-events: none;
        }

        .detail-overlay.active .detail-bg-text {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
        }

        .detail-image-container {
            width: 35vw;
            height: 48vw;
            max-width: 450px;
            max-height: 600px;
            z-index: 2;
            position: relative;
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.8s cubic-bezier(0.19, 1, 0.22, 1) 0.3s;
            box-shadow: 0 30px 60px rgba(0,0,0,0.8);
        }

        .detail-overlay.active .detail-image-container {
            transform: translateY(0);
            opacity: 1;
        }

        .detail-image-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .detail-info {
            position: absolute;
            bottom: 3rem;
            left: 3rem;
            z-index: 3;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.6s cubic-bezier(0.19, 1, 0.22, 1) 0.6s;
        }

        .detail-overlay.active .detail-info {
            opacity: 1;
            transform: translateY(0);
        }

        .detail-title {
            font-size: 4rem;
            line-height: 1;
            margin-bottom: 0.5rem;
            color: var(--text-color);
        }
        
        .detail-role {
            font-size: 0.85rem;
            letter-spacing: 2px;
            color: var(--accent-color);
        }

        .close-btn {
            position: absolute;
            top: 2rem;
            right: 3rem;
            z-index: 4;
            font-size: 0.85rem;
            letter-spacing: 2px;
            cursor: none;
            opacity: 0;
            transition: opacity 0.5s ease 0.8s;
        }
        
        .detail-overlay.active .close-btn {
            opacity: 1;
        }
        
        .close-btn::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 0;
            width: 100%;
            height: 1px;
            background-color: var(--text-color);
            transition: transform 0.3s ease;
            transform-origin: right;
        }
        .close-btn:hover::after { transform: scaleX(0); transform-origin: left; }

        /* Loader */
        #loader {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-color);
            z-index: 99999;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Anton', sans-serif;
            font-size: 2rem;
            letter-spacing: 5px;
            transition: opacity 0.5s ease;
        }

    </style>
</head>
<body>

    <!-- Custom Cursor -->
    <div class="cursor" id="cursor"></div>

    <!-- Loading Screen -->
    <div id="loader">LOADING ARISTIDE...</div>

    <!-- Header -->
    <header>
        <a href="#" class="logo display-font text-2xl tracking-[4px]">ARISTIDE</a>
        
        <div class="hidden md:flex items-center">
            <span class="progress-text" id="current-slide">01</span>
            <div class="progress-bar-container">
                <div class="progress-bar" id="progress-bar"></div>
            </div>
            <span class="progress-text" id="total-slide">10</span>
        </div>

        <a href="#">ABOUT</a>
    </header>

    <!-- Main 3D Gallery -->
    <main class="gallery-container">
        <div class="gallery-track" id="gallery-track">
            <!-- Items will be injected by JavaScript -->
        </div>
    </main>

    <!-- Detail View Overlay -->
    <div class="detail-overlay" id="detail-overlay">
        <div class="close-btn" id="close-btn">CLOSE</div>
        <div class="detail-bg-text display-font" id="detail-bg-text">TITLE</div>
        <div class="detail-image-container">
            <img src="" alt="Detail" id="detail-image">
        </div>
        <div class="detail-info">
            <div class="detail-role display-font" id="detail-role">CREATIVE DIRECTION</div>
            <div class="detail-title display-font" id="detail-title">PROJECT TITLE</div>
        </div>
    </div>

    <!-- Mobile interaction hint -->
    <div class="fixed bottom-8 left-1/2 -translate-x-1/2 text-xs tracking-widest opacity-50 md:hidden pointer-events-none display-font">
        DRAG TO EXPLORE
    </div>

    <script>
        // --- Data ---
        const galleryData = [
            { id: 1, title: "HOUSE OF GUCCI", role: "ART DIRECTION", img: "https://images.unsplash.com/photo-1539109136881-3be0616acf4b?q=80&w=800&auto=format&fit=crop" },
            { id: 2, title: "DESIGN EMBRACED", role: "WEB EXPERIENCE", img: "https://images.unsplash.com/photo-1515886657613-9f3515b0c78f?q=80&w=800&auto=format&fit=crop" },
            { id: 3, title: "MARRY MONDAY", role: "BRAND IDENTITY", img: "https://images.unsplash.com/photo-1469334031218-e382a71b716b?q=80&w=800&auto=format&fit=crop" },
            { id: 4, title: "URBAN TALES", role: "PHOTOGRAPHY", img: "https://images.unsplash.com/photo-1449844908441-8829872d2607?q=80&w=800&auto=format&fit=crop" },
            { id: 5, title: "SILENT ECHO", role: "3D MOTION", img: "https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=800&auto=format&fit=crop" },
            { id: 6, title: "NEON DRIFT", role: "CREATIVE CODING", img: "https://images.unsplash.com/photo-1550684848-fac1c5b4e853?q=80&w=800&auto=format&fit=crop" },
            { id: 7, title: "OCEAN BREEZE", role: "CAMPAIGN", img: "https://images.unsplash.com/photo-1505118380757-91f5f5632de0?q=80&w=800&auto=format&fit=crop" },
            { id: 8, title: "DESERT SANDS", role: "EDITORIAL", img: "https://images.unsplash.com/photo-1469854523086-cc02fe5d8800?q=80&w=800&auto=format&fit=crop" },
            { id: 9, title: "LUNAR ECLIPSE", role: "VFX", img: "https://images.unsplash.com/photo-1534447677768-be436bb09401?q=80&w=800&auto=format&fit=crop" },
            { id: 10, title: "FUTURE FORMS", role: "TYPOGRAPHY", img: "https://images.unsplash.com/photo-1600132806370-bf17e65e942f?q=80&w=800&auto=format&fit=crop" },
        ];

        // --- State & Variables ---
        const track = document.getElementById('gallery-track');
        const cursor = document.getElementById('cursor');
        const progressBar = document.getElementById('progress-bar');
        const currentSlideText = document.getElementById('current-slide');
        const totalSlideText = document.getElementById('total-slide');
        
        let targetScroll = 0;
        let currentScroll = 0;
        let ease = 0.07; // Lerp ease factor (관성 강도)
        let itemWidth = 0;
        let itemSpacing = 0;
        let maxScroll = 0;
        let isDragging = false;
        let startX = 0;
        let isDetailViewOpen = false;

        // --- Initialization ---
        function init() {
            // Update total items text
            totalSlideText.innerText = galleryData.length.toString().padStart(2, '0');

            // Generate DOM Items
            galleryData.forEach((data, index) => {
                const item = document.createElement('div');
                item.className = 'gallery-item';
                item.dataset.index = index;
                
                const inner = document.createElement('div');
                inner.className = 'gallery-item-inner';
                
                const img = document.createElement('img');
                img.src = data.img;
                img.alt = data.title;
                
                const idxText = document.createElement('div');
                idxText.className = 'item-index display-font';
                idxText.innerText = (index + 1).toString().padStart(2, '0');

                inner.appendChild(img);
                item.appendChild(inner);
                item.appendChild(idxText);
                track.appendChild(item);

                // Hover & Click Interactions
                item.addEventListener('mouseenter', () => cursor.classList.add('hovered'));
                item.addEventListener('mouseleave', () => {
                    cursor.classList.remove('hovered');
                    inner.style.transform = `rotateX(0deg) rotateY(0deg)`; // Reset tilt
                });
                
                // Tilt Effect
                item.addEventListener('mousemove', (e) => {
                    if(isDragging) return;
                    const rect = item.getBoundingClientRect();
                    const x = e.clientX - rect.left;
                    const y = e.clientY - rect.top;
                    const centerX = rect.width / 2;
                    const centerY = rect.height / 2;
                    const tiltX = ((y - centerY) / centerY) * -15; // Max 15deg
                    const tiltY = ((x - centerX) / centerX) * 15;
                    
                    inner.style.transform = `rotateX(${tiltX}deg) rotateY(${tiltY}deg)`;
                });

                // Open Detail
                item.addEventListener('click', (e) => {
                    // Prevent click if dragging
                    if(Math.abs(targetScroll - currentScroll) > 5) return;
                    openDetailView(data);
                });
            });

            calculateDimensions();
            window.addEventListener('resize', calculateDimensions);
            
            // Remove Loader
            setTimeout(() => {
                document.getElementById('loader').style.opacity = '0';
                setTimeout(() => document.getElementById('loader').style.display = 'none', 500);
            }, 1000);

            // Start Animation Loop
            requestAnimationFrame(render);
        }

        function calculateDimensions() {
            const firstItem = document.querySelector('.gallery-item');
            if(firstItem) {
                // Determine responsive spacing
                const vWidth = window.innerWidth;
                itemWidth = firstItem.offsetWidth;
                itemSpacing = vWidth < 768 ? itemWidth * 1.2 : itemWidth * 1.5; // Gap between items
                maxScroll = (galleryData.length - 1) * itemSpacing;
            }
        }

        // --- Scroll & Drag Logic ---
        window.addEventListener('wheel', (e) => {
            if(isDetailViewOpen) return;
            // Adjust sensitivity
            targetScroll += e.deltaY * 0.8;
            targetScroll += e.deltaX * 0.8; 
            targetScroll = Math.max(0, Math.min(targetScroll, maxScroll));
        }, { passive: true });

        // Touch & Drag Support
        const handleDragStart = (e) => {
            if(isDetailViewOpen) return;
            isDragging = true;
            startX = e.type.includes('mouse') ? e.clientX : e.touches[0].clientX;
            document.body.style.cursor = 'none'; // Keep custom cursor active
        };

        const handleDragMove = (e) => {
            if (!isDragging || isDetailViewOpen) return;
            const currentX = e.type.includes('mouse') ? e.clientX : e.touches[0].clientX;
            const diff = startX - currentX;
            targetScroll += diff * 1.5; // Drag speed multiplier
            targetScroll = Math.max(0, Math.min(targetScroll, maxScroll));
            startX = currentX;
        };

        const handleDragEnd = () => {
            isDragging = false;
        };

        window.addEventListener('mousedown', handleDragStart);
        window.addEventListener('mousemove', handleDragMove);
        window.addEventListener('mouseup', handleDragEnd);
        window.addEventListener('touchstart', handleDragStart, { passive: true });
        window.addEventListener('touchmove', handleDragMove, { passive: true });
        window.addEventListener('touchend', handleDragEnd);

        // --- Custom Cursor Logic ---
        window.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
        });

        // --- Detail View Logic ---
        const overlay = document.getElementById('detail-overlay');
        const detailImg = document.getElementById('detail-image');
        const detailBgText = document.getElementById('detail-bg-text');
        const detailTitle = document.getElementById('detail-title');
        const detailRole = document.getElementById('detail-role');
        const closeBtn = document.getElementById('close-btn');

        function openDetailView(data) {
            isDetailViewOpen = true;
            cursor.classList.remove('hovered');
            
            // Set Data
            detailImg.src = data.img;
            detailBgText.innerText = data.title;
            detailTitle.innerText = data.title;
            detailRole.innerText = data.role;

            // Animate In
            overlay.classList.add('active');
            
            // Fade out gallery items slightly
            document.querySelectorAll('.gallery-item').forEach(item => {
                item.style.opacity = '0';
            });
        }

        closeBtn.addEventListener('click', () => {
            isDetailViewOpen = false;
            overlay.classList.remove('active');
            
            // Restore gallery items
            document.querySelectorAll('.gallery-item').forEach(item => {
                item.style.opacity = '1';
            });
        });

        closeBtn.addEventListener('mouseenter', () => cursor.classList.add('hovered'));
        closeBtn.addEventListener('mouseleave', () => cursor.classList.remove('hovered'));

        // --- Render Loop (Lerp & 3D Math) ---
        function render() {
            if(!isDetailViewOpen) {
                // Lerp current scroll towards target scroll
                currentScroll += (targetScroll - currentScroll) * ease;
                
                // Update Progress Bar
                const progressRatio = currentScroll / maxScroll || 0;
                progressBar.style.width = `${progressRatio * 100}%`;

                // Determine active index for UI
                const activeIndex = Math.round(currentScroll / itemSpacing);
                currentSlideText.innerText = (activeIndex + 1).toString().padStart(2, '0');

                // Update each item's 3D transform
                const items = document.querySelectorAll('.gallery-item');
                items.forEach((item, index) => {
                    // Position relative to current scroll
                    // index * itemSpacing is the item's anchor point
                    const itemPosition = (index * itemSpacing) - currentScroll; 
                    
                    // Ratio of distance from center of screen (-1 to 1 mostly)
                    // If itemPosition is 0, it's perfectly centered
                    const screenRatio = itemPosition / (window.innerWidth / 2);
                    
                    // 1. Translate X (Horizontal movement)
                    const translateX = itemPosition;
                    
                    // 2. Rotate Y (Perspective Curve)
                    // Multiplier controls how aggressively it turns
                    const rotateY = screenRatio * -35; 
                    
                    // 3. Translate Z (Push back edge items)
                    // Absolute distance dictates how far back it goes
                    const translateZ = Math.abs(screenRatio) * -400; 

                    // 4. Opacity & Visibility optimization
                    const opacity = 1 - Math.abs(screenRatio) * 0.4;
                    
                    item.style.transform = `translate3d(${translateX}px, 0px, ${translateZ}px) rotateY(${rotateY}deg)`;
                    
                    // Optional: Fade out items completely out of view for performance
                    if(Math.abs(screenRatio) > 2) {
                        item.style.visibility = 'hidden';
                    } else {
                        item.style.visibility = 'visible';
                    }
                });
            }

            requestAnimationFrame(render);
        }

        // Initialize on load
        window.onload = init;

    </script>
</body>
</html>
